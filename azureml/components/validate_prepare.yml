$schema: https://azuremlschemas.azureedge.net/latest/commandComponent.schema.json
type: command
name: pricing_mlops_validate_prepare
version: 0.1.2
display_name: validate_prepare
description: Validate masked pricing input and publish prepared intermediate artifacts.
code: ../..
environment: azureml:pricing-mlops-runtime:0.1.0
inputs:
  storage_account:
    type: string
  input_blob_path:
    type: string
  run_id:
    type: string
  job_identity_client_id:
    type: string
outputs:
  flow_token:
    type: uri_folder
command: >-
  MLOPS_USE_MANAGED_IDENTITY_CREDENTIAL=true
  AZURE_ML_JOB_IDENTITY_CLIENT_ID=${{inputs.job_identity_client_id}}
  python scripts/components/validate_prepare.py
  --storage-account ${{inputs.storage_account}}
  --input-container raw-masked
  --input-blob-path ${{inputs.input_blob_path}}
  --output-dir outputs/prepared_data
  --prepared-container artifacts
  --prepared-prefix component-state/${{inputs.run_id}}/prepared &&
  mkdir -p ${{outputs.flow_token}} &&
  echo validate_prepare > ${{outputs.flow_token}}/done.txt
