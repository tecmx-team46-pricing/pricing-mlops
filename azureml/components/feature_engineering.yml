$schema: https://azuremlschemas.azureedge.net/latest/commandComponent.schema.json
type: command
name: pricing_mlops_feature_engineering
version: 0.1.0
display_name: feature_engineering
description: Build current AUTH feature table from masked pricing input.
code: ../..
environment: azureml:pricing-mlops-runtime:0.1.0
inputs:
  storage_account:
    type: string
  input_container:
    type: string
    default: raw-masked
  input_blob_path:
    type: string
  run_id:
    type: string
  feature_container:
    type: string
    default: artifacts
  feature_prefix:
    type: string
  job_identity_client_id:
    type: string
  previous_step_token:
    type: uri_folder
outputs:
  flow_token:
    type: uri_folder
command: >-
  MLOPS_USE_MANAGED_IDENTITY_CREDENTIAL=true
  AZURE_ML_JOB_IDENTITY_CLIENT_ID=${{inputs.job_identity_client_id}}
  python scripts/components/feature_engineering.py
  --storage-account ${{inputs.storage_account}}
  --input-container ${{inputs.input_container}}
  --input-blob-path ${{inputs.input_blob_path}}
  --output-dir outputs/feature_engineering
  --run-id ${{inputs.run_id}}
  --feature-container ${{inputs.feature_container}}
  --feature-prefix ${{inputs.feature_prefix}} &&
  mkdir -p ${{outputs.flow_token}} &&
  echo feature_engineering > ${{outputs.flow_token}}/done.txt
