$schema: https://azuremlschemas.azureedge.net/latest/commandComponent.schema.json
type: command
name: pricing_mlops_simulate_operational_handoff
version: 0.1.3
display_name: simulate_operational_handoff
description: Simulate the downstream operational handoff from the AUTH semaforo decision.
code: ../..
environment: azureml:pricing-mlops-runtime:0.1.0
inputs:
  storage_account:
    type: string
  run_id:
    type: string
  job_identity_client_id:
    type: string
  previous_step_token:
    type: uri_folder
outputs:
  flow_token:
    type: uri_folder
command: >-
  test -f ${{inputs.previous_step_token}}/done.txt &&
  MLOPS_USE_MANAGED_IDENTITY_CREDENTIAL=true
  AZURE_ML_JOB_IDENTITY_CLIENT_ID=${{inputs.job_identity_client_id}}
  python scripts/components/run_monitoring_step.py
  --step simulate_operational_handoff
  --input-dir outputs/operational_decision
  --output-dir outputs/simulate_operational_handoff
  --run-id ${{inputs.run_id}}
  --storage-account ${{inputs.storage_account}}
  --decision-container artifacts
  --decision-prefix component-state/${{inputs.run_id}}/operational_decision
  --handoff-container artifacts
  --handoff-prefix component-state/${{inputs.run_id}}/simulate_operational_handoff &&
  mkdir -p ${{outputs.flow_token}} &&
  echo simulate_operational_handoff > ${{outputs.flow_token}}/done.txt
