$schema: https://azuremlschemas.azureedge.net/latest/commandComponent.schema.json
type: command
name: pricing_mlops_calculate_auth_history_drift
version: 0.1.2
display_name: calculate_auth_history_drift
description: Calculate AUTH history drift artifacts.
code: ../..
environment: azureml:pricing-mlops-runtime:0.1.0
inputs:
  storage_account:
    type: string
  run_id:
    type: string
  job_identity_client_id:
    type: string
  previous_step_token:
    type: uri_folder
outputs:
  flow_token:
    type: uri_folder
command: >-
  test -f ${{inputs.previous_step_token}}/done.txt &&
  MLOPS_USE_MANAGED_IDENTITY_CREDENTIAL=true
  AZURE_ML_JOB_IDENTITY_CLIENT_ID=${{inputs.job_identity_client_id}}
  python scripts/components/run_monitoring_step.py
  --step calculate_auth_history_drift
  --input-dir outputs/recommendation_validity
  --output-dir outputs/auth_history_drift
  --run-id ${{inputs.run_id}}
  --storage-account ${{inputs.storage_account}}
  --validity-container artifacts
  --validity-prefix component-state/${{inputs.run_id}}/recommendation_validity
  --drift-container artifacts
  --drift-prefix component-state/${{inputs.run_id}}/auth_history_drift &&
  mkdir -p ${{outputs.flow_token}} &&
  echo calculate_auth_history_drift > ${{outputs.flow_token}}/done.txt
