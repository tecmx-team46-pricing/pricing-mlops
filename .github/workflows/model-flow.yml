name: Model Flow

on:
  pull_request:
  workflow_dispatch:
    inputs:
      environment:
        description: "GitHub/Azure environment to use"
        type: choice
        options:
          - staging
          - validation
        default: staging
      run_owner:
        description: "Logical owner partition for uploaded outputs"
        type: string
        required: false
        default: team46
      run_azure_flow:
        description: "Run model flow and upload outputs to Azure Storage"
        type: boolean
        default: false
      input_blob_path:
        description: "Optional blob path under MLOPS_CONTAINER_RAW_MASKED to use as input"
        type: string
        required: false
        default: "samples/sample_pricing_v1.csv"
      run_smoke_health:
        description: "Run optional environment health smoke test"
        type: boolean
        default: false

jobs:
  model-ci:
    name: Model CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -e ".[dev]"

      - name: Compile Python files
        run: python -m compileall src scripts tests

      - name: Run tests
        run: python -m pytest

      - name: Validate masked sample
        run: python scripts/validate_inputs.py --input data/samples/masked/sample_pricing.csv

      - name: Run local model flow
        run: python scripts/run_local_flow.py --input data/samples/masked/sample_pricing.csv --output runs/local

  smoke-health:
    name: Environment Health Smoke Test
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.run_smoke_health
    environment: ${{ inputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run environment health smoke test
        env:
          FUNCTION_HEALTH_ENDPOINT: ${{ vars.FUNCTION_HEALTH_ENDPOINT }}
        run: python scripts/smoke_health.py

  azure-model-flow:
    name: Azure Model Flow
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.run_azure_flow
    environment: ${{ inputs.environment }}
    permissions:
      contents: read
      id-token: write
    env:
      MLOPS_ENVIRONMENT: ${{ inputs.environment }}
      MLOPS_RUN_OWNER: ${{ inputs.run_owner }}
      AZURE_STORAGE_ACCOUNT: ${{ vars.AZURE_STORAGE_ACCOUNT }}
      MLOPS_CONTAINER_RAW_MASKED: ${{ vars.MLOPS_CONTAINER_RAW_MASKED }}
      MLOPS_CONTAINER_CURATED: ${{ vars.MLOPS_CONTAINER_CURATED }}
      MLOPS_CONTAINER_RUNS: ${{ vars.MLOPS_CONTAINER_RUNS }}
      MLOPS_CONTAINER_SNAPSHOTS: ${{ vars.MLOPS_CONTAINER_SNAPSHOTS }}
      MLOPS_CONTAINER_DRIFT_LOGS: ${{ vars.MLOPS_CONTAINER_DRIFT_LOGS }}
      MLOPS_CONTAINER_REPORTS: ${{ vars.MLOPS_CONTAINER_REPORTS }}
      MLOPS_CONTAINER_ARTIFACTS: ${{ vars.MLOPS_CONTAINER_ARTIFACTS }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -e ".[dev]"

      - name: Resolve input dataset
        id: input
        shell: bash
        run: |
          set -euo pipefail
          input_path="data/samples/masked/sample_pricing.csv"
          if [[ -n "${{ inputs.input_blob_path }}" ]]; then
            mkdir -p runs/azure-input
            input_path="runs/azure-input/input.csv"
            echo "Downloading input from ${MLOPS_CONTAINER_RAW_MASKED}/${{ inputs.input_blob_path }}"
            az storage blob download \
              --account-name "${AZURE_STORAGE_ACCOUNT}" \
              --container-name "${MLOPS_CONTAINER_RAW_MASKED}" \
              --name "${{ inputs.input_blob_path }}" \
              --file "${input_path}" \
              --auth-mode login \
              --overwrite true
          else
            echo "Using local masked sample at ${input_path}"
          fi
          echo "Resolved input path: ${input_path}"
          echo "input_path=${input_path}" >> "${GITHUB_OUTPUT}"

      - name: Run model flow
        shell: bash
        run: |
          set -euo pipefail
          python scripts/validate_inputs.py --input "${{ steps.input.outputs.input_path }}"
          python scripts/run_local_flow.py --input "${{ steps.input.outputs.input_path }}" --output runs/azure
          run_dir="$(find runs/azure -mindepth 1 -maxdepth 1 -type d | sort | tail -n 1)"
          run_id="$(basename "${run_dir}")"
          echo "Run directory: ${run_dir}"
          echo "Run id: ${run_id}"
          echo "RUN_DIR=${run_dir}" >> "${GITHUB_ENV}"
          echo "RUN_ID=${run_id}" >> "${GITHUB_ENV}"

      - name: Upload run outputs to Storage
        run: python scripts/upload_run_outputs.py --run-dir "${RUN_DIR}"
