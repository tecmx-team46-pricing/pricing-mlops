name: Model Flow

on:
  pull_request:
  workflow_dispatch:
    inputs:
      environment:
        description: "GitHub/Azure environment to use"
        type: choice
        options:
          - staging
          - validation
        default: staging
      run_owner:
        description: "Logical owner partition for uploaded outputs"
        type: string
        required: false
        default: team46
      run_azure_flow:
        description: "Run model flow and upload outputs to Azure Storage"
        type: boolean
        default: false
      input_blob_path:
        description: "Optional blob path under MLOPS_CONTAINER_RAW_MASKED to use as input"
        type: string
        required: false
        default: "samples/sample_pricing_v1.csv"
jobs:
  model-ci:
    name: Model CI
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || !inputs.run_azure_flow
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -e ".[dev]"

      - name: Compile Python files
        run: python -m compileall src scripts tests

      - name: Run tests
        run: python -m pytest

      - name: Validate masked sample
        run: python scripts/validate_inputs.py --input data/samples/masked/sample_pricing.csv

      - name: Run local model flow
        run: python scripts/run_local_flow.py --input data/samples/masked/sample_pricing.csv --output runs/local

  azure-model-flow:
    name: Azure Model Flow
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.run_azure_flow
    environment: ${{ inputs.environment }}
    permissions:
      contents: read
      id-token: write
    env:
      MLOPS_ENVIRONMENT: ${{ inputs.environment }}
      MLOPS_RUN_OWNER: ${{ inputs.run_owner }}
      AZURE_STORAGE_ACCOUNT: ${{ vars.AZURE_STORAGE_ACCOUNT }}
      MLOPS_CONTAINER_RAW_MASKED: ${{ vars.MLOPS_CONTAINER_RAW_MASKED }}
      MLOPS_CONTAINER_CURATED: ${{ vars.MLOPS_CONTAINER_CURATED }}
      MLOPS_CONTAINER_RUNS: ${{ vars.MLOPS_CONTAINER_RUNS }}
      MLOPS_CONTAINER_SNAPSHOTS: ${{ vars.MLOPS_CONTAINER_SNAPSHOTS }}
      MLOPS_CONTAINER_DRIFT_LOGS: ${{ vars.MLOPS_CONTAINER_DRIFT_LOGS }}
      MLOPS_CONTAINER_REPORTS: ${{ vars.MLOPS_CONTAINER_REPORTS }}
      MLOPS_CONTAINER_ARTIFACTS: ${{ vars.MLOPS_CONTAINER_ARTIFACTS }}
      AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
      AZURE_CONTAINER_REGISTRY: ${{ vars.AZURE_CONTAINER_REGISTRY }}
      AZURE_CONTAINERAPP_JOB_NAME: ${{ vars.AZURE_CONTAINERAPP_JOB_NAME }}
      AZURE_CONTAINERAPP_JOB_IDENTITY: ${{ vars.AZURE_CONTAINERAPP_JOB_IDENTITY }}
      AZURE_CONTAINERAPP_JOB_CLIENT_ID: ${{ vars.AZURE_CONTAINERAPP_JOB_CLIENT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Validate Azure orchestration variables
        shell: bash
        run: |
          set -euo pipefail
          required=(
            AZURE_STORAGE_ACCOUNT
            MLOPS_CONTAINER_RAW_MASKED
            MLOPS_CONTAINER_CURATED
            MLOPS_CONTAINER_RUNS
            MLOPS_CONTAINER_SNAPSHOTS
            MLOPS_CONTAINER_DRIFT_LOGS
            MLOPS_CONTAINER_REPORTS
            MLOPS_CONTAINER_ARTIFACTS
            AZURE_RESOURCE_GROUP
            AZURE_CONTAINER_REGISTRY
            AZURE_CONTAINERAPP_JOB_NAME
            AZURE_CONTAINERAPP_JOB_IDENTITY
            AZURE_CONTAINERAPP_JOB_CLIENT_ID
          )
          for name in "${required[@]}"; do
            if [[ -z "${!name:-}" ]]; then
              echo "Missing required GitHub environment variable: ${name}" >&2
              exit 1
            fi
          done

      - name: Build and push model image
        shell: bash
        run: |
          set -euo pipefail
          login_server="${AZURE_CONTAINER_REGISTRY}.azurecr.io"
          image="${login_server}/pricing-mlops:${GITHUB_SHA}"
          az acr login --name "${AZURE_CONTAINER_REGISTRY}"
          docker build --pull -t "${image}" .
          docker push "${image}"
          echo "Container image: ${image}"
          echo "MODEL_IMAGE=${image}" >> "${GITHUB_ENV}"

      - name: Start Azure model job
        shell: bash
        run: |
          set -euo pipefail
          run_id="$(date -u +%Y%m%dT%H%M%SZ)-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          identity_id="/subscriptions/${{ vars.AZURE_SUBSCRIPTION_ID }}/resourceGroups/${AZURE_RESOURCE_GROUP}/providers/Microsoft.ManagedIdentity/userAssignedIdentities/${AZURE_CONTAINERAPP_JOB_IDENTITY}"
          echo "Azure compute: Container Apps Job ${AZURE_CONTAINERAPP_JOB_NAME}"
          echo "Remote input: ${MLOPS_CONTAINER_RAW_MASKED}/${{ inputs.input_blob_path }}"
          echo "Run id: ${run_id}"
          echo "RUN_ID=${run_id}" >> "${GITHUB_ENV}"
          execution_name="$(az containerapp job start \
            --name "${AZURE_CONTAINERAPP_JOB_NAME}" \
            --resource-group "${AZURE_RESOURCE_GROUP}" \
            --image "${MODEL_IMAGE}" \
            --registry-identity "${identity_id}" \
            --cpu 0.25 \
            --memory 0.5Gi \
            --env-vars \
              AZURE_STORAGE_ACCOUNT="${AZURE_STORAGE_ACCOUNT}" \
              AZURE_CLIENT_ID="${AZURE_CONTAINERAPP_JOB_CLIENT_ID}" \
              MLOPS_ENVIRONMENT="${MLOPS_ENVIRONMENT}" \
              MLOPS_RUN_OWNER="${MLOPS_RUN_OWNER}" \
              MLOPS_RUN_ID="${run_id}" \
              MLOPS_CONTAINER_RAW_MASKED="${MLOPS_CONTAINER_RAW_MASKED}" \
              MLOPS_INPUT_BLOB_PATH="${{ inputs.input_blob_path }}" \
              MLOPS_CONTAINER_CURATED="${MLOPS_CONTAINER_CURATED}" \
              MLOPS_CONTAINER_RUNS="${MLOPS_CONTAINER_RUNS}" \
              MLOPS_CONTAINER_SNAPSHOTS="${MLOPS_CONTAINER_SNAPSHOTS}" \
              MLOPS_CONTAINER_DRIFT_LOGS="${MLOPS_CONTAINER_DRIFT_LOGS}" \
              MLOPS_CONTAINER_REPORTS="${MLOPS_CONTAINER_REPORTS}" \
              MLOPS_CONTAINER_ARTIFACTS="${MLOPS_CONTAINER_ARTIFACTS}" \
            --query name -o tsv)"
          echo "Azure job execution: ${execution_name}"
          echo "JOB_EXECUTION_NAME=${execution_name}" >> "${GITHUB_ENV}"

      - name: Wait for Azure model job
        shell: bash
        run: |
          set -euo pipefail
          for attempt in {1..60}; do
            execution_json="$(az containerapp job execution show \
              --name "${AZURE_CONTAINERAPP_JOB_NAME}" \
              --resource-group "${AZURE_RESOURCE_GROUP}" \
              --job-execution-name "${JOB_EXECUTION_NAME}" \
              -o json)"
            status="$(python -c 'import json,sys; data=json.load(sys.stdin); print(data.get("properties", {}).get("status") or data.get("status") or "")' <<< "${execution_json}")"
            echo "Azure job status: ${status:-unknown}"
            if [[ "${status}" == "Succeeded" ]]; then
              exit 0
            fi
            if [[ "${status}" == "Failed" || "${status}" == "Canceled" || "${status}" == "Stopped" ]]; then
              exit 1
            fi
            sleep 15
          done
          echo "Timed out waiting for Azure Container Apps Job execution." >&2
          exit 1

      - name: Verify Storage outputs
        shell: bash
        run: |
          set -euo pipefail
          run_date="${RUN_ID:0:8}"
          prefix="environment=${MLOPS_ENVIRONMENT}/owner=${MLOPS_RUN_OWNER}/run_date=${run_date}/run_id=${RUN_ID}"
          outputs=(
            "${MLOPS_CONTAINER_RUNS}:${prefix}/model_run_log.json"
            "${MLOPS_CONTAINER_SNAPSHOTS}:${prefix}/model_output_snapshot.csv"
            "${MLOPS_CONTAINER_DRIFT_LOGS}:${prefix}/model_drift_log.json"
            "${MLOPS_CONTAINER_REPORTS}:${prefix}/report.md"
            "${MLOPS_CONTAINER_ARTIFACTS}:${prefix}/curated_pricing.csv"
            "${MLOPS_CONTAINER_CURATED}:${prefix}/curated_pricing.csv"
          )
          for item in "${outputs[@]}"; do
            container="${item%%:*}"
            blob="${item#*:}"
            exists="$(az storage blob exists \
              --account-name "${AZURE_STORAGE_ACCOUNT}" \
              --container-name "${container}" \
              --name "${blob}" \
              --auth-mode login \
              --query exists -o tsv)"
            echo "output check: container=${container} blob_path=${blob} exists=${exists}"
            if [[ "${exists}" != "true" ]]; then
              exit 1
            fi
          done
