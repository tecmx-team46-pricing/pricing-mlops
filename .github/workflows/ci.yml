name: CI

on:
  pull_request:
  workflow_dispatch:

jobs:
  model-ci:
    name: Model CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -e ".[dev]"

      - name: Compile Python files
        run: python -m compileall src scripts tests

      - name: Run tests
        run: python -m pytest

      - name: Validate masked sample
        run: python scripts/validate_inputs.py --input data/samples/masked/sample_pricing.csv
