name: azureml-components

on:
  push:
    branches:
      - main
    paths:
      - "azureml/components/**"
      - "azureml/endpoints/**"
      - "azureml/pipelines/**"
      - "azureml/manifests/**"
      - "azureml/environment.yml"
      - "azureml/conda.yml"
      - "scripts/components/**"
      - "src/pricing/auth_monitoring/**"
      - "src/pricing_mlops/monitoring/pipeline/**"
      - "configs/azureml_auth_monitoring.yml"
      - "scripts/azureml/**"
      - "scripts/deploy_auth_monitoring_batch_endpoint.sh"
      - "scripts/register_azureml_components.sh"
      - ".github/workflows/azureml-components.yml"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  register-components:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Checkout model repo
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Install Azure ML Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install "azure-ai-ml>=1.32.0" "azure-identity>=1.17.0" "pyyaml>=6.0"

      - name: Register Azure ML components
        env:
          AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
          AZURE_ML_WORKSPACE: ${{ vars.AZURE_ML_WORKSPACE }}
        run: python scripts/azureml/register_assets.py --config configs/azureml_auth_monitoring.yml

      - name: Deploy AUTH monitoring batch endpoint
        env:
          AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
          AZURE_ML_WORKSPACE: ${{ vars.AZURE_ML_WORKSPACE }}
        run: python scripts/azureml/deploy_endpoint.py --config configs/azureml_auth_monitoring.yml

      - name: Upload AUTH monitoring release manifest
        uses: actions/upload-artifact@v4
        with:
          name: auth-monitoring-release
          path: azureml/manifests/auth-monitoring-release.json
